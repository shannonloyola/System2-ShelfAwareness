name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/supplier-service/**'
      - 'tests/provider/**'
      - 'scripts/filter-pact.mjs'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/supplier-service/**'
      - 'tests/provider/**'
      - 'scripts/filter-pact.mjs'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v1'
  SERVICE_NAME: 'supplier-service'

jobs:
  # Backend Build and Test Job
  backend-build:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/supplier-service
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/supplier-service/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint --if-present

      - name: Run Unit Tests
        run: npm run test

      - name: Run Backend Integration Tests
        run: npm run test:integration --if-present

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: services/supplier-service/coverage/
          retention-days: 7
        if: always()

  # Provider Contract Testing Job
  provider-contract-testing:
    name: Backend Provider Contract Tests
    runs-on: ubuntu-latest
    needs: backend-build
    
    defaults:
      run:
        working-directory: ./
    
    services:
      # Start test database
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: supplier_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Service Dependencies
        run: |
          cd services/supplier-service
          npm ci

      - name: Setup Test Environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:test@localhost:5432/supplier_test" >> services/supplier-service/.env.test
          echo "NODE_ENV=test" >> services/supplier-service/.env.test

      - name: Run Database Migrations
        run: |
          cd services/supplier-service
          npm run migrate --if-present

      - name: Run Provider Contract Tests
        run: npm run test:provider

      - name: Run Provider Tests for Supplier Service
        run: npm run test:provider:supplier

      - name: Verify Pacts with Broker
        if: github.ref == 'refs/heads/main' && env.PACT_BROKER_TOKEN != ''
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: npm run pact:verify

      - name: Upload Pact Verification Results
        uses: actions/upload-artifact@v4
        with:
          name: pact-verification-results
          path: pact-results/
          retention-days: 7
        if: always()

  # Backend Security Scan
  security-scan:
    name: Backend Security Scan
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: services/supplier-service
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/supplier-service/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm audit --audit-level=moderate

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: monitor

  # Docker Build and Push
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [backend-build, provider-contract-testing]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    defaults:
      run:
        working-directory: services/supplier-service
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.SERVICE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: services/supplier-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to Staging (Backend)
  deploy-staging:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    needs: [backend-build, provider-contract-testing, docker-build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying backend to staging..."
          # Add your staging deployment logic here
          # Example: Kubernetes, Docker Swarm, AWS ECS, etc.
          
      - name: Run Health Check
        run: |
          echo "Running health check against staging..."
          # Add health check commands here
          
      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests against staging backend..."
          # Add backend smoke test commands here

  # Deploy to Production (Backend)
  deploy-production:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    needs: [backend-build, provider-contract-testing, security-scan, docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Deployment Safety
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "Checking deployment safety with Pact Broker..."
          npm run pact:can-i-deploy || {
            echo "❌ DEPLOYMENT BLOCKED: Contract verification failed"
            exit 1
          }
          echo "✅ Deployment safety check passed"

      - name: Deploy to Production
        run: |
          echo "Deploying backend to production..."
          # Add your production deployment logic here
          
      - name: Run Production Health Check
        run: |
          echo "Running health check against production..."
          # Add production health check commands here
          
      - name: Run Production Smoke Tests
        run: |
          echo "Running smoke tests against production backend..."
          # Add production smoke test commands here

      - name: Notify Deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Backend deployed to production!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()

  # Database Migration Job
  database-migration:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Database Migrations
        run: |
          echo "Running database migrations for production..."
          # Add your database migration logic here
          
      - name: Verify Migration
        run: |
          echo "Verifying database migration..."
          # Add migration verification commands here
