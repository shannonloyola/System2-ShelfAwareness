name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v1'

jobs:
  # Frontend Build and Test Job
  frontend-build:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint --if-present

      - name: Run Type Check
        run: npm run type-check --if-present

      - name: Run Unit Tests
        run: npm run test -- --coverage --watchAll=false
        env:
          PROVIDER_BASE_URL: ${{ secrets.PROVIDER_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run Integration Tests
        run: npm run test:integration --if-present

      - name: Build Frontend
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

      - name: Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: frontend
          name: frontend-coverage
        if: always()

  # Contract Testing Job (Frontend Consumer)
  contract-testing:
    name: Frontend Contract Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    
    defaults:
      run:
        working-directory: ./
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Consumer Contract Tests
        run: npm run test:contract

      - name: Run Breaking Contract Tests
        run: npm run test:contract:breaking --if-present

      - name: Publish Pacts to Broker
        if: github.ref == 'refs/heads/main' && env.PACT_BROKER_TOKEN != ''
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
        run: npm run pact:publish

      - name: Upload Pact Files
        uses: actions/upload-artifact@v4
        with:
          name: frontend-pacts
          path: pacts/
          retention-days: 7

  # Frontend Security Scan
  security-scan:
    name: Frontend Security Scan
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm audit --audit-level=moderate

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # Frontend Performance Test
  performance-test:
    name: Frontend Performance Test
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'pull_request'
    
    defaults:
      run:
        working-directory: ./
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # Deploy to Staging (Frontend)
  deploy-staging:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    needs: [frontend-build, contract-testing]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    defaults:
      run:
        working-directory: ./
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to Staging
        run: |
          echo "Deploying frontend to staging..."
          
      - name: Run Smoke Tests
        run: |
          echo "Running smoke tests against staging..."

  # Deploy to Production (Frontend)
  deploy-production:
    name: Deploy Frontend to Production
    runs-on: ubuntu-latest
    needs: [frontend-build, contract-testing, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    defaults:
      run:
        working-directory: ./
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Deploy to Production
        run: |
          echo "Deploying frontend to production..."
          
      - name: Run Production Smoke Tests
        run: |
          echo "Running smoke tests against production..."

      - name: Notify Deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Frontend deployed to production!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()