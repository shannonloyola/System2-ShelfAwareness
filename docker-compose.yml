version: '3.8'

services:
  # Infrastructure
  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - pharma-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - pharma-network

  # Core Services
  pharma-frontend:
    build:
      context: ./scm/scm-frontend
    container_name: pharma-frontend
    ports:
      - "5173:5173"
    env_file: .env
    environment:
      - PORT=5173
      - NODE_ENV=production
    networks:
      - pharma-network

  pharma-backend:
    build:
      context: ./scm/scm-backend/backend
    container_name: pharma-backend
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - PORT=3001
      - NODE_ENV=production
    networks:
      - pharma-network

  # Specialized Microservices
  supplier-service:
    build:
      context: ./scm/scm-backend/services/supplier-service
    container_name: supplier-service
    ports:
      - "4001:4001"
    env_file: .env
    environment:
      - PORT=4001
      - NODE_ENV=production
    networks:
      - pharma-network

  procurement-service:
    build:
      context: ./scm/scm-backend/services/procurement-service
    container_name: procurement-service
    ports:
      - "4002:4002"
    env_file: .env
    environment:
      - PORT=4002
      - NODE_ENV=production
    networks:
      - pharma-network

  product-catalog-service:
    build:
      context: ./scm/scm-backend/services/product-catalog-service
    container_name: product-catalog-service
    ports:
      - "4003:4003"
    env_file: .env
    environment:
      - PORT=4003
      - NODE_ENV=production
    networks:
      - pharma-network

  inventory-service:
    build:
      context: ./scm/scm-backend/services/inventory-service
    container_name: inventory-service
    ports:
      - "4004:4004"
    env_file: .env
    environment:
      - PORT=4004
      - NODE_ENV=production
    networks:
      - pharma-network

  warehouse-receiving-service:
    build:
      context: ./scm/scm-backend/services/warehouse-receiving-service
    container_name: warehouse-receiving-service
    ports:
      - "4005:4005"
    env_file: .env
    environment:
      - PORT=4005
      - NODE_ENV=production
    networks:
      - pharma-network

  distribution-service:
    build:
      context: ./scm/scm-backend/services/distribution-service
    container_name: distribution-service
    ports:
      - "4006:4006"
    env_file: .env
    environment:
      - PORT=4006
      - NODE_ENV=production
    networks:
      - pharma-network

  discrepancy-qc-service:
    build:
      context: ./scm/scm-backend/services/discrepancy-qc-service
    container_name: discrepancy-qc-service
    ports:
      - "4007:4007"
    env_file: .env
    environment:
      - PORT=4007
      - NODE_ENV=production
    networks:
      - pharma-network

  stock-adjustment-service:
    build:
      context: ./scm/scm-backend/services/stock-adjustment-service
    container_name: stock-adjustment-service
    ports:
      - "4008:4008"
    env_file: .env
    environment:
      - PORT=4008
      - NODE_ENV=production
    networks:
      - pharma-network

  cycle-counting-service:
    build:
      context: ./scm/scm-backend/services/cycle-counting-service
    container_name: cycle-counting-service
    ports:
      - "4009:4009"
    env_file: .env
    environment:
      - PORT=4009
      - NODE_ENV=production
    networks:
      - pharma-network

  risk-compliance-service:
    build:
      context: ./scm/scm-backend/services/risk-compliance-service
    container_name: risk-compliance-service
    ports:
      - "4010:4010"
    env_file: .env
    environment:
      - PORT=4010
      - NODE_ENV=production
    networks:
      - pharma-network

  notification-service:
    build:
      context: ./scm/scm-backend/services/notification-service
    container_name: notification-service
    ports:
      - "4011:4011"
    env_file: .env
    environment:
      - PORT=4011
      - NODE_ENV=production
    networks:
      - pharma-network

  reporting-analytics-service:
    build:
      context: ./scm/scm-backend/services/reporting-analytics-service
    container_name: reporting-analytics-service
    ports:
      - "4012:4012"
    env_file: .env
    environment:
      - PORT=4012
      - NODE_ENV=production
    networks:
      - pharma-network

  document-service:
    build:
      context: ./scm/scm-backend/services/document-service
    container_name: document-service
    ports:
      - "4013:4013"
    env_file: .env
    environment:
      - PORT=4013
      - NODE_ENV=production
    networks:
      - pharma-network

  auth-user-access-service:
    build:
      context: ./scm/scm-backend/services/auth-user-access-service
    container_name: auth-user-access-service
    ports:
      - "4014:4014"
    env_file: .env
    environment:
      - PORT=4014
      - NODE_ENV=production
    networks:
      - pharma-network

networks:
  pharma-network:
    driver: bridge

volumes:
  influxdb_data:
  grafana_data:
