# Development Docker Compose Configuration
# Use this for local development with hot reload

version: '3.8'

services:
  # Frontend Development Service
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: builder
    container_name: pharma-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4001
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./package.json:/app/package.json
    depends_on:
      - backend-dev
    networks:
      - pharma-network
    command: npm run dev

  # Backend Development Service
  backend-dev:
    build:
      context: ./services/supplier-service
      dockerfile: Dockerfile
      target: builder
    container_name: supplier-service-dev
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - PORT=4001
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/supplier_db
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - pharma-network
    volumes:
      - ./services/supplier-service/src:/app/src
      - ./services/supplier-service/package.json:/app/package.json
      - ./services/supplier-service/__tests__:/app/__tests__
    command: npm run dev

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=supplier_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./suppliers_schema.sql:/docker-entrypoint-initdb.d/01-suppliers.sql
      - ./payments_schema.sql:/docker-entrypoint-initdb.d/02-payments.sql
      - ./risk_assessments_schema.sql:/docker-entrypoint-initdb.d/03-risk-assessments.sql
      - ./delivery_schedules_schema.sql:/docker-entrypoint-initdb.d/04-delivery-schedules.sql
    networks:
      - pharma-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis-cache-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - pharma-network

networks:
  pharma-network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:
